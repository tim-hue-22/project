<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Maps</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f4f4f4;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
    }

    .description {
        margin: 10px 0;
        color: #555;
    }

    .open-btn {
        display: inline-block;
        padding: 10px 15px;
        background-color: #0078ff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.2s;
    }

    .open-btn:hover {
        background-color: #005fcc;
    }
</style>
</head>
<body>

<h1>China</h1>

<div class="gallery">

    <div class="card">
        <a href="images/logo_bj.png" target="_blank">
    <img src="images/beijing.gif" alt="Photo 1">
</a>
        </a>
    </div>

    <div class="card">
        <img src="images/logo_sh.png" alt="Shanghai">
        <p class="description">Shanghai Metro</p>
        <a class="open-btn" href="images/Shanghai.jpg" target="_blank">
            Open Image
        </a>
    </div>

    <div class="card">
        <img src="images/logo_sz.png" alt="Shenzhen">
        <p class="description">Shenzhen Metro</p>
        <a class="open-btn" href="images/Shenzhen.jpg" target="_blank">
            Open Image
        </a>
    </div>

</div>

</body>
</html>
